<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,300;1,8..60,400;1,8..60,500&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    /* prevent FOUC — light is default; opt-in dark via [data-theme="dark"] */
    (function() {
      var t = localStorage.getItem('gtd-theme');
      if (t === 'dark') document.documentElement.dataset.theme = 'dark';
    })();
  </script>

  {%- if site.goatcounter.site and site.goatcounter.site != '' -%}
  <!-- GoatCounter — privacy-friendly, cookieless, GDPR-clean stats -->
  <script data-goatcounter="https://{{ site.goatcounter.site }}.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  {%- endif -%}
</head>
<body>

  <div class="bg-atmosphere" aria-hidden="true"></div>

  <header class="site-header">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-brand">
        <span class="brand-pulse"></span>
        <span class="brand-text">GitHub Trending Digest <span class="brand-tag">/ digest</span></span>
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">首页</a>
        <span class="nav-divider"></span>
        <a href="https://github.com/maxzyma/github-trending-digest" target="_blank" rel="noopener">源码仓库</a>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换深 / 浅模式" title="切换深 / 浅模式">◐</button>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <article class="content-body">
      {{ content }}
    </article>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-mono">GitHub Trending Digest</span>
      <span class="footer-sep">·</span>
      <span class="footer-dim">每日开源情报 · Amber Terminal · 四源 grounding</span>
    </div>
    <div class="footer-inner footer-sister">
      <span class="footer-dim">Sister site</span>
      <span class="footer-sep">·</span>
      <a href="https://theuntold.ai/" class="footer-link" target="_blank" rel="noopener">theuntold.ai</a>
      <span class="footer-dim">— AI 时代批判性媒体监督</span>
    </div>
  </footer>

  <script>
    function toggleTheme() {
      var cur = document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
      var next = cur === 'dark' ? 'light' : 'dark';
      if (next === 'dark') {
        document.documentElement.dataset.theme = 'dark';
      } else {
        delete document.documentElement.dataset.theme;
      }
      localStorage.setItem('gtd-theme', next);
    }
  </script>

</body>
</html>
