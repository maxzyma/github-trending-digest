<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;1,8..60,300;1,8..60,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <div class="bg-atmosphere" aria-hidden="true"></div>

  <header class="site-header">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-brand">
        <span class="brand-pulse"></span>
        <span class="brand-text">GitHub Trending Digest</span>
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Index</a>
        <a href="https://github.com/maxzyma/github-trending-digest" target="_blank" rel="noopener">Repo</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <article class="content-body">
      {{ content }}
    </article>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-mono">GitHub Trending Digest</span>
      <span class="footer-sep">·</span>
      <span class="footer-dim">Daily OSS Intelligence</span>
    </div>
  </footer>

</body>
</html>
