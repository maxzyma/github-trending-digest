title: GitHub Trending Digest
description: >-
  Daily deep analysis of GitHub Trending — not just a list, but community-grounded
  insights with HN/X/Reddit cross-validation, risk signals, and real-world usage from Issues.
baseurl: "/github-trending-digest"
url: "https://maxzyma.github.io"

theme: minima

header_pages:
  - index.md

exclude:
  - repos/
  - README.md
  - _config.yml

defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# ─── 3rd-party widgets — placeholders, fill after external setup ───
# Setup:
#   1. https://giscus.app — pick repo, mapping=pathname, category=Comments
#      → copy data-repo-id and data-category-id into the values below
#      → install https://github.com/apps/giscus on the repo
#   2. https://www.goatcounter.com/signup — create site (e.g. "gtd-digest")
#      → put the chosen subdomain into goatcounter.site below
#
# Empty strings disable the widget — site renders fine without them.

giscus:
  repo: "maxzyma/github-trending-digest"
  repo_id: "R_kgDOSCBYJA"
  category: "Announcements"  # Announcement type — only maintainer creates threads, cleanest for blog comments
  category_id: "DIC_kwDOSCBYJM4C8qQz"

goatcounter:
  site: "gtd-digest"    # → https://gtd-digest.goatcounter.com
